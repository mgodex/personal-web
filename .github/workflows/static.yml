# 自动部署静态内容到 GitHub Pages 的完整工作流
name: Deploy static content to Pages

on:
  # 当向 master 分支推送代码时触发
  push:
    branches: ["master"]

  # 允许在 Actions 标签页手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个并发部署，跳过队列中的任务，但不会取消正在进行的任务
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 2. 安装依赖并运行 Gulp 构建
      - name: Install dependencies & Build
        run: |
          npm install
          npx gulp

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 指向 Gulp 编译输出的静态文件夹（这里假设是 release）
          path: './release'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
